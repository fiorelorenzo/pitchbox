<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pitchbox</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <h1>Pitchbox</h1>
    <label
      >Backend URL
      <input id="backendUrl" type="url" placeholder="http://127.0.0.1:5180" />
    </label>
    <label
      >Token
      <input id="token" type="password" placeholder="64-character hex token" autocomplete="off" />
    </label>
    <button id="connect">Connect</button>
    <div id="status" class="status" hidden></div>
    <hr style="margin: 14px 0; border-color: #222;" />
    <div class="row" style="display: flex; gap: 8px; align-items: center;">
      <span id="syncLabel" style="flex: 1; font-size: 12px; color: #a0a0a0;">DM sync: never</span>
      <button id="syncNow" style="margin: 0; width: auto; padding: 6px 12px;">Sync now</button>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
