<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pitchbox</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <h1>Pitchbox</h1>
    <label
      >Backend URL
      <input id="backendUrl" type="url" placeholder="http://127.0.0.1:5180" />
    </label>
    <label
      >Token
      <input id="token" type="password" placeholder="64-character hex token" autocomplete="off" />
    </label>
    <button id="connect">Connect</button>
    <div id="status" class="status" hidden></div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
