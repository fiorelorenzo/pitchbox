name: deploy-prod
on:
  push:
    tags: ['v*']
# Prod has its OWN concurrency group so a queued preview deploy can never
# supersede/cancel a pending prod deploy (GitHub only keeps the newest pending
# run per group when cancel-in-progress is false). Prod deploys still serialize
# among themselves; they may briefly overlap a preview build, which the box's
# swap absorbs. See #214.
concurrency:
  group: prodbox-deploy-prod
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, prodbox]
    steps:
      - name: Checkout tag (umbrella only)
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Fetch private submodules via deploy keys
        run: git submodule update --init --recursive
      - name: Sync source into the deploy dir
        run: |
          rsync -a --exclude '.git' --exclude '.env' --exclude 'node_modules' \
            ./ /opt/apps/pitchbox/
      - name: Blue-green deploy
        run: /opt/apps/pitchbox/scripts/deploy.sh prod "${GITHUB_REF_NAME}"
