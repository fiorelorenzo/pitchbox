# Prod overlay for the app: built image, auto-restart, resource limits, hardening.
# The web port is published (put it behind your TLS reverse proxy) or exposed via
# the cloudflared sidecar (profile: tunnel). No read-only root here: the web does
# Playwright/Chrome scraping, which needs writable scratch.
#
#   docker compose -f docker-compose.yml -f docker-compose.app.yml -f docker-compose.app.prod.yml up -d
services:
  web:
    image: ${APP_IMAGE:-pitchbox-app:latest}
    pull_policy: ${APP_PULL_POLICY:-build}
    environment:
      WEB_PORT: ${WEB_PORT:-5180}
      # This overlay assumes exactly one trusted reverse proxy in front of
      # web: host Caddy, terminating TLS and forwarding to this container.
      # That lets adapter-node trust the X-Forwarded-For header Caddy sets,
      # one hop deep, so `event.getClientAddress()` (used by e.g. the
      # extension pairing-code rate limiter, #194) resolves to the real
      # caller instead of Caddy's own loopback address for every request.
      # Only set these here, not in the base app overlay - they are only
      # correct when Caddy is guaranteed to be the sole proxy in front of web.
      ADDRESS_HEADER: x-forwarded-for
      XFF_DEPTH: '1'
    ports:
      - '${APP_BIND:-127.0.0.1}:${WEB_PORT:-5180}:${WEB_PORT:-5180}'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${WEB_MEM_LIMIT:-2g}
          cpus: '${WEB_CPU_LIMIT:-2}'
    stop_grace_period: 30s

  daemon:
    image: ${APP_IMAGE:-pitchbox-app:latest}
    pull_policy: ${APP_PULL_POLICY:-build}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${DAEMON_MEM_LIMIT:-512m}
          cpus: '${DAEMON_CPU_LIMIT:-1}'
    stop_grace_period: 20s

  # Optional: expose the dashboard publicly with TLS and no open ports, via a
  # Cloudflare Tunnel. Enable with `--profile tunnel`; route the hostname to
  # http://web:${WEB_PORT} in the Cloudflare dashboard.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pitchbox-web-tunnel
    restart: unless-stopped
    command: ['tunnel', '--no-autoupdate', 'run', '--token', '${WEB_TUNNEL_TOKEN:-}']
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - tunnel
