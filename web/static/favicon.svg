<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pitchbox">
  <title>Pitchbox</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <!-- Outreach arrow rising out of an open box silhouette -->
  <path d="M124 332 L124 200 L256 132 L388 200 L388 332 Z"
        fill="none" stroke="url(#accent)" stroke-width="28" stroke-linejoin="round"/>
  <path d="M256 132 L256 240" stroke="url(#accent)" stroke-width="28" stroke-linecap="round"/>
  <!-- Pitch arrow -->
  <path d="M178 280 L256 202 L334 280"
        fill="none" stroke="#f8fafc" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
